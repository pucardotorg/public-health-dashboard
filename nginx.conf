server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # Vite is built with base "/health/", so every asset URL
    # in index.html is prefixed with that path. Serve the app under the same
    # prefix (the ingress path also matches) and fall back to its index.html
    # for client-side routes.
    location /health/ {
        try_files $uri $uri/ /health/index.html;
    }

    location ~* ^/health/.*\.(?:css|js|svg|png|jpg|jpeg|gif|ico|woff2?)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public";
    }
}
