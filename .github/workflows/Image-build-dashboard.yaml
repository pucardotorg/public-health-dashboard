name: Public Health Dashboard Image Build workflow
on:
  push:
    branches:
      - develop
      - main
      - release/**
    tags:
      - 'v*'
  pull_request:
    branches:
      - develop
      - main
      - release/**
  workflow_dispatch:
  workflow_call:
permissions:
  security-events: write
  contents: read
jobs:
  docker-image-build:
    runs-on: ubuntu-latest
    outputs:
      deployment_env: ${{ steps.set_deployment_environment.outputs.deployment_env }}
      image_tag: ${{ steps.set_image_tag.outputs.image_tag }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Docker
        uses: docker/setup-buildx-action@v2

      # Login to Azure Container Registry
      - name: Login to Docker Registry
        if: (github.event_name == 'push' && (startsWith(github.ref, 'refs/heads/develop') || startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/heads/main') || startsWith(github.ref, 'refs/tags/v'))) || github.event_name == 'workflow_dispatch'
        run: docker login -u venkatramireddyb -p ${{ secrets.ACR_PASSWORD }}

      - name: Set Version from Tag or Branch
        id: set_version
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            VERSION=${GITHUB_REF#refs/tags/}  # Use tag name for version
          elif [[ "${GITHUB_REF}" == refs/heads/* ]]; then
            # Use branch name as version, replacing '/' with '-'
            VERSION=${GITHUB_REF#refs/heads/}
            VERSION=$(echo "${VERSION}" | sed 's|/|-|g')
          else
            VERSION="latest"  # Default version if not a tag or branch
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Get commit ID
        run: echo "COMMIT_ID=$(git rev-parse HEAD)" >> $GITHUB_ENV

      - name: Build and Push Docker image for Public-Health-Dashboard
        if: (github.event_name == 'push' && (startsWith(github.ref, 'refs/heads/develop') || startsWith(github.ref, 'refs/heads/release/') || startsWith(github.ref, 'refs/heads/main') || startsWith(github.ref, 'refs/tags/v'))) || github.event_name == 'workflow_dispatch'
        run: |
          docker build \
          -t docker.io/venkatramireddyb/public-health-dashboard:${{ env.VERSION }}-${{ env.COMMIT_ID }} .
          docker push docker.io/venkatramireddyb/public-health-dashboard:${{ env.VERSION }}-${{ env.COMMIT_ID }}

      - name: set image tag
        id: set_image_tag
        run: |
          echo "image_tag=${{ env.VERSION }}-${{ env.COMMIT_ID }}" >> $GITHUB_OUTPUT

      - name: set deployment environment
        id: set_deployment_environment
        run: |
          EVENT="${{ github.event_name }}"
          BASE_REF="${{ github.event.pull_request.base.ref }}"
          REF_NAME="${{ github.ref_name }}"
          ENV_VALUE=""

          if [[ "$EVENT" == "workflow_dispatch" ]]; then
            ENV_VALUE="${{ inputs.deployment_env }}"
          elif [[ "$EVENT" == "pull_request" ]]; then
            case "$BASE_REF" in
              main)          ENV_VALUE="sdc-uat" ;;
              develop)       ENV_VALUE="dev" ;;
              release/*)     ENV_VALUE="qa" ;;
              *)             ENV_VALUE="dev" ;;
            esac
          elif [[ "$EVENT" == "push" ]]; then
            case "$REF_NAME" in
              main)          ENV_VALUE="sdc-uat" ;;
              develop)       ENV_VALUE="dev" ;;
              release/*)     ENV_VALUE="qa" ;;
              *)             ENV_VALUE="dev" ;;
            esac
          fi
          echo "Final Determined Env: $ENV_VALUE"
          echo "deployment_env=$ENV_VALUE" >> $GITHUB_ENV
          echo "deployment_env=$ENV_VALUE" >> $GITHUB_OUTPUT

  Workflow_Trigger:
    if: (github.event_name == 'push' && (startsWith(github.ref, 'refs/heads/develop') || startsWith(github.ref, 'refs/heads/release') || startsWith(github.ref, 'refs/heads/main') || startsWith(github.ref, 'refs/tags/v'))) || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: docker-image-build
    steps:
      - name: Set Workflow File Based on Branch
        id: set_workflow
        run: |
          if [ "${{ github.ref }}" == "refs/heads/develop" ]; then
            echo "WORKFLOW_FILE=manual-service-deploy.yaml" >> $GITHUB_ENV
          elif [ "${{ github.ref }}" == "refs/heads/main" ]; then
            echo "WORKFLOW_FILE=update-image-tag.yaml" >> $GITHUB_ENV
          fi

      - name: Deploy to Kubernetes
        run: |
          curl -X POST \
          -H "Accept: application/vnd.github.v3+json" \
          -H "Authorization: token ${{ secrets.GHUB_TOKEN }}" \
          https://api.github.com/repos/pucardotorg/pucar-Devops/actions/workflows/${{ env.WORKFLOW_FILE }}/dispatches \
          -d '{"ref":"pucar-stg", "inputs": {"service_name": "public-health-dashboard", "service_tag": "${{ needs.docker-image-build.outputs.image_tag }}", "environment": "${{ needs.docker-image-build.outputs.deployment_env }}"}}'
